# Single internet-facing ALB fronting both web apps via path-based routing.
# Requires the AWS Load Balancer Controller to be installed in the cluster.
# Each web app reads BASE_PATH from its ConfigMap and renders all links/forms
# under that prefix, so no rewrite-target rule is needed.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - http:
        paths:
          - path: /dataentry
            pathType: Prefix
            backend:
              service:
                name: web-dataentry
                port:
                  number: 8080
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: web-analytics
                port:
                  number: 8080

# This file holds ConfigMaps for various K8s object environment variables
---
# Secret environment variables
apiVersion: v1
kind: Secret
metadata:
  name: env-secret

data:
  MYSQL_PASSWORD: Q0hBTkdFTUU= # base64 for "CHANGEME"
  MONGO_INITDB_ROOT_PASSWORD: Q0hBTkdFTUU= # base64 for "CHANGEME"

---
# MySQL Non-secret environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-env-configmap

data:
  MYSQL_USER: datastore_user
  MYSQL_DATABASE: datastore
  MYSQL_RANDOM_ROOT_PASSWORD: "true"

---
# MongoDB Non-secret environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-env-configmap

data:
  MONGO_INITDB_DATABASE: analytics
  MONGO_INITDB_ROOT_USERNAME: root

# This file holds ConfigMaps and Secrets for K8s workload environment variables
---
# Secret environment variables
apiVersion: v1
kind: Secret
metadata:
  name: env-secret

stringData:
  MYSQL_PASSWORD: CHANGEME
  MYSQL_ROOT_PASSWORD: CHANGEME
  MONGO_INITDB_ROOT_PASSWORD: CHANGEME
  AUTH_MYSQL_PASSWORD: CHANGEME
  AUTH_JWT_SECRET: change-me-jwt-secret
  WEB_AUTH_ADMIN_PASSWORD: admin

---
# MySQL Non-secret environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-env-configmap

data:
  MYSQL_USER: datastore_user
  MYSQL_DATABASE: datastore
  # Auth schema bootstrap (consumed by db-mysql init script)
  AUTH_MYSQL_USER: auth_user
  AUTH_MYSQL_DATABASE: auth

---
# MongoDB Non-secret environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-env-configmap

data:
  MONGO_INITDB_DATABASE: analytics
  MONGO_INITDB_ROOT_USERNAME: root

---
# svc_authentication non-secret env
apiVersion: v1
kind: ConfigMap
metadata:
  name: svc-auth-env-configmap
  labels:
    app: svc-auth

data:
  AUTH_MYSQL_HOST: mysql-service
  AUTH_MYSQL_PORT: "3306"
  AUTH_MYSQL_USER: auth_user
  AUTH_MYSQL_DATABASE: auth
  AUTH_TOKEN_TTL_SECONDS: "3600"
  AUTH_BCRYPT_ROUNDS: "12"
  AUTH_DB_POOL_SIZE: "5"
  AUTH_DB_MAX_OVERFLOW: "5"
  WEB_AUTH_ADMIN_USER: admin

---
# web_dataentry non-secret env
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-dataentry-env-configmap
  labels:
    app: web-dataentry

data:
  PORT: "8080"
  BASE_PATH: ""
  COOKIE_SECURE: "false"  # ALB terminates TLS; flip to true once HTTPS is set up
  TRUST_PROXY: "true"
  AUTH_HOST_ADDR: svc-auth
  AUTH_PORT: "8080"
  MYSQL_HOST_ADDR: mysql-service
  MYSQL_PORT: "3306"
  MYSQL_USER: datastore_user
  MYSQL_DATABASE: datastore

---
# web_analytics non-secret env
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-analytics-env-configmap
  labels:
    app: web-analytics

data:
  PORT: "8080"
  BASE_PATH: ""
  COOKIE_SECURE: "false"
  TRUST_PROXY: "true"
  AUTH_HOST_ADDR: svc-auth
  AUTH_PORT: "8080"
  MONGO_HOST_ADDR: mongodb-service
  MONGO_PORT: "27017"
  MONGO_INITDB_DATABASE: analytics
  MONGO_INITDB_ROOT_USERNAME: root

---
# svc_analytics non-secret env
apiVersion: v1
kind: ConfigMap
metadata:
  name: svc-analytics-env-configmap
  labels:
    app: svc-analytics

data:
  ANALYTICS_INTERVAL_SECONDS: "60"
  MYSQL_HOST_ADDR: mysql-service
  MYSQL_PORT: "3306"
  MYSQL_USER: datastore_user
  MYSQL_DATABASE: datastore
  MONGO_HOST_ADDR: mongodb-service
  MONGO_PORT: "27017"
  MONGO_INITDB_DATABASE: analytics
  MONGO_INITDB_ROOT_USERNAME: root

services:
  db_mysql:
    image: mysql:latest
    container_name: db_mysql
    expose:
      - "3306"
    env_file: .env
    volumes:
      - ./.volumes/mysql_data_volume:/var/lib/mysql
  
  db_mongodb:
    image: mongo:latest
    container_name: db_mongodb
    expose:
      - "27017"
    env_file: .env
    volumes:
      - ./.volumes/mongodb_data_volume:/data/db

  svc_authentication:
    build: ./svc_authentication
    container_name: svc_authentication
    expose:
      - "8080"
    env_file: .env
    volumes:
      - ./.volumes/auth_data_volume:/data

  svc_analytics:
    build: ./svc_analytics
    container_name: svc_analytics
    env_file: .env
    depends_on:
      - db_mysql
      - db_mongodb
      - web_dataentry
  
  web_analytics:
    build: ./web_analytics
    container_name: web_analytics
    ports:
      - "8081:8080"
    env_file: .env
    depends_on:
      - svc_authentication
      - db_mongodb
      - svc_analytics
  
  web_dataentry:
    build: ./web_dataentry
    container_name: web_dataentry
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - svc_authentication
      - db_mysql